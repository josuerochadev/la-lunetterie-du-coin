<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- Critical CSS inline pour éviter render blocking -->
  <style>
    *,*::before,*::after{box-sizing:border-box}html,body,#root{position:relative;height:100%;min-height:100dvh;background-color:#fff}body{font-family:'Satoshi',system-ui,sans-serif;line-height:1.5;color:#000;-webkit-font-smoothing:antialiased;overflow-x:hidden;margin:0;padding:0}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}
  </style>
  
  <title>La Lunetterie du Coin</title>
  
  <!-- Preconnect to speed up other resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
</head>

<body>
  <div id="root">
    <!-- Fallback content for Lighthouse FCP - will be replaced by React -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;background:#fff;color:#000;font-family:'Satoshi',system-ui,sans-serif;padding:2rem;">
      <div style="text-align:center;">
        <div style="width:48px;height:48px;border:3px solid #FEEB09;border-top-color:transparent;border-radius:50%;margin:0 auto 1.5rem;animation:spin 0.8s linear infinite;"></div>
        <p style="font-size:1rem;margin:0;opacity:0.5;letter-spacing:0.05em;">Chargement...</p>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <script type="module" src="/src/main.tsx" defer></script>
