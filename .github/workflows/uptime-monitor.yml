# .github/workflows/uptime-monitor.yml
name: 📡 Uptime Monitor

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  uptime-check:
    name: 📡 Check Site Status
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🌐 Check production site
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://www.lalunetterieducoin.fr || echo "000")
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 10 https://www.lalunetterieducoin.fr || echo "0")

          echo "📡 Status: $HTTP_STATUS"
          echo "⏱️ Response time: ${RESPONSE_TIME}s"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Site is DOWN (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ Site is UP"

      - name: 📥 Checkout code
        if: failure()
        uses: actions/checkout@v4

      - name: 📧 Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Uptime Alert: Site is DOWN';
            const body = [
              'The production site https://www.lalunetterieducoin.fr returned a non-200 status.',
              '',
              `**Detected at:** ${new Date().toISOString()}`,
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Please investigate immediately. See [deployment guide](docs/deployment.md) for rollback procedures.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'urgent']
            });
